name: Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env

      - name: Check Rust formatting
        shell: nix develop .#ci-lite --accept-flake-config --command sh -e {0}
        run: cargo fmt --check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          pnpm_cache: true

      - name: Check frontend formatting
        shell: nix develop .#ci-lite --accept-flake-config --command sh -e {0}
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prettier --check .

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env

      - name: Check Nix formatting
        shell: nix develop .#ci-lite --accept-flake-config --command sh -e {0}
        run: git ls-files "*.nix" | xargs -r nixfmt --check

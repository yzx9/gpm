name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          rust_cache: true
          pnpm_cache: true

      - name: Run backend tests
        run: nix develop --accept-flake-config --command sh -c 'pnpm install --frozen-lockfile && just test-be'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          pnpm_cache: true

      - name: Run frontend tests
        run: nix develop --accept-flake-config --command sh -c 'pnpm install --frozen-lockfile && sh scripts/gen-icons.sh && just test-fe'

  # Runs every local Android plugin's Robolectric/JVM unit tests via the
  # aggregated `testPlugins` gradle task. The tests are pure JVM (no NDK, no Rust
  # artifacts), but gradle can't even configure without tauri.settings.gradle
  # present — and that file is gitignored, generated only by `tauri android
  # build`. So a single-ABI debug build is done first purely to produce it; the
  # unit tests then run on the configured project. A guard first verifies every
  # local path plugin in src-tauri/Cargo.toml is included, so a stale generation
  # can't silently skip a plugin's tests.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          rust_cache: true
          pnpm_cache: true
          java_cache: true

      - name: Build single-ABI + run plugin tests
        # gen-icons + a single-ABI debug build produce the gitignored
        # tauri.settings.gradle that gradle needs to configure; `just test-plugin`
        # then guards that every local plugin in Cargo.toml is included and runs
        # the aggregated `testPlugins` task on the configured project.
        run: nix develop --accept-flake-config --command sh -c 'pnpm install --frozen-lockfile && sh scripts/gen-icons.sh && pnpm tauri android build --debug --target aarch64 && just test-plugin'

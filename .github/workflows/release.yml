name: Release Android APK

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build signed APK
        run: nix develop --command bash -c "pnpm install && pnpm tauri android build"

      - name: Rename APK for release
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk \
            "gpm-${VERSION}.apk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "gpm ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: gpm-${{ steps.version.outputs.version }}.apk
          body: |
            ## gpm ${{ steps.version.outputs.version }}

            ### Installation
            Download the APK below and install on your Android device.
            You may need to enable "Install from unknown sources" in your device settings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

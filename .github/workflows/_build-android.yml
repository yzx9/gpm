name: _Build Android APK

on:
  workflow_call:
    inputs:
      build_type:
        description: "Build type: debug or release"
        type: string
        default: debug
      split_per_abi:
        description: "Build per-architecture APKs"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android"

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Configure Android NDK
        run: |
          echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Setup Android signing
        if: inputs.build_type == 'release'
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build APKs
        run: |
          pnpm install
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            pnpm tauri android build --apk --split-per-abi ${{ inputs.build_type == 'debug' && '--debug' || '' }}
            pnpm tauri android build --apk ${{ inputs.build_type == 'debug' && '--debug' || '' }}
          else
            pnpm tauri android build --apk ${{ inputs.build_type == 'debug' && '--debug' || '' }}
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.build_type }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 5

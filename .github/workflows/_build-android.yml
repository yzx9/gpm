name: _Build Android APK

on:
  workflow_call:
    inputs:
      build_type:
        description: "Build type: debug or release"
        type: string
        default: debug
      split_per_abi:
        description: "Build per-architecture APKs"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          rust_cache: true
          pnpm_cache: true
          java_cache: true

      - name: Setup Android signing
        if: inputs.build_type == 'release'
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build APKs
        # GHA expression string literals need single quotes; lift them into env
        # so the sh -c body uses plain shell vars (no ${{ }} inside the quotes).
        env:
          DEBUG_FLAG: ${{ inputs.build_type == 'debug' && '--debug' || '' }}
          # Debug builds (PR + main) cross-compile aarch64 only — 4 Rust targets
          # down to 1. Release/tag builds keep the full ABI set via --split-per-abi.
          TARGET: ${{ inputs.build_type == 'debug' && '--target aarch64' || '' }}
          SPLIT: ${{ inputs.split_per_abi }}
        run: |
          nix develop .#full --accept-flake-config --command sh -c '
            set -e
            pnpm install --frozen-lockfile
            sh scripts/gen-icons.sh
            if [ "$SPLIT" = "true" ]; then
              pnpm tauri android build --apk --split-per-abi $DEBUG_FLAG
              pnpm tauri android build --apk $DEBUG_FLAG
            else
              pnpm tauri android build --apk $DEBUG_FLAG $TARGET
            fi
          '

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.build_type }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 5

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          rust_cache: true
          pnpm_cache: true

      - name: Clippy
        run: nix develop .#lite --accept-flake-config --command sh -c 'pnpm install --frozen-lockfile && sh scripts/gen-icons.sh && cargo clippy --all-targets --all-features -- -D warnings'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci-env
        with:
          pnpm_cache: true

      - name: Check locale JSON for duplicate keys
        run: nix develop .#lite --accept-flake-config --command sh -c 'node scripts/check-locale-keys.mjs'

      - name: vue-tsc type check
        run: nix develop .#lite --accept-flake-config --command sh -c 'pnpm install --frozen-lockfile && pnpm exec vue-tsc --noEmit'

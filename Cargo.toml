[workspace]
resolver = "2"
members = ["rustpass", "src-tauri", "gpm-plugin-safe-area"]

[workspace.package]
version = "0.2.0"
authors = ["Zexin Yuan"]
edition = "2021"
license = "Apache-2.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
age = { version = "0.11", features = ["armor", "ssh"] }
zeroize = { version = "1", features = ["derive"] }
git2 = { version = "0.20", features = ["vendored-openssl", "vendored-libgit2"] }
walkdir = "2"
tokio = { version = "1", features = ["time"] }
tempfile = "3"
ssh-key = { version = "0.6", features = ["ed25519", "encryption", "rand_core", "std"] }
